<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DesignerBot Dashboard</title>
  <style>
    body { font-family: system-ui, Arial; margin: 2rem; }
    .status { font-weight: bold; }
    button { margin-right: .5rem; }
    .note { color: #666; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>DesignerBot Dashboard</h1>
  <p>Bot: <span id="bot-name">-</span></p>
  <p>Status: <span id="status" class="status">...</span></p>
  <button id="refresh">Refresh</button>
  <button id="start">Start Bot (admin)</button>
  <button id="stop">Stop Bot (admin)</button>

  <p class="note">Admin actions require an admin key. Jangan masukkan token ke web publik.</p>

  <script src="/app.js"></script>
</body>
</html>
